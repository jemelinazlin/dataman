<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        /* Header */
        h1 {
            color: brown;
            text-align: center;
            margin-top: 20px;
            font-style: italic;
        }

        h2 {
            text-align: center;
        }

        p {
            text-align: center;
            padding: 0 20px;
        }

        /* Navigation */
        nav {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }

        nav a:hover {
            color: aqua;
        }

        hr {
            margin: 20px;
        }

        /* Form */
        form {
            width: 350px;
            margin: auto;
            padding: 20px;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid gray;
        }

        button {
            background-color: brown;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
        }

        button:hover {
            background-color: darkred;
        }

        /* Contact info */
        .contact-info {
            text-align: center;
            margin-top: 20px;
        }

        /* Image */
        img {
            display: block;
            margin: 20px auto;
            width: 320px;
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 12px;
            margin-top: 20px;
        }

    </style>

</head>

<body>

    <!-- Navigation -->
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Courses</a>
        <a href="shop.html">Shop</a>
        <a href="blog.html">Blog</a>
        <a href="contact.html">Contact</a>
    </nav>

    <!-- Header -->
    <h1>Contact Programming Hub</h1>

    <p>
        Have questions about programming tutorials or coding resources?
        Send us a message below.
    </p>

    <hr>

    <!-- Contact Form -->
    <form>

        <label>Full Name</label>
        <input type="text">

        <label>Email Address</label>
        <input type="email">

        <label>Website URL</label>
        <input type="url">

        <label>Select Date</label>
        <input type="date">

        <label>Upload File</label>
        <input type="file">

        <label>Programming Topic</label>
        <input type="text">

        <label>Your Message</label>
        <textarea rows="5"></textarea>

        <button type="submit">Send Message</button>

    </form>

    <!-- Contact Info -->
    <div class="contact-info">

        <h2>Other Ways to Reach Us</h2>

        <p>Email: support@programminghub.com</p>

        <p>Phone: +254 700 123 456</p>

    </div>

    <!-- Image -->
    <img src="contact-coding.jpg" alt="Coding Support">

    <!-- Footer -->
    <footer>
        <p>© 2026 Programming Hub | Learn. Code. Create.</p>
    </footer>

</body>
</html>
