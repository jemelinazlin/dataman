<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        nav {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }

        nav a:hover {
            color: aqua;
        }

        h1 {
            color: brown;
            text-align: center;
            margin-top: 20px;
            font-style: italic;
        }

        p {
            text-align: center;
        }

        form {
            width: 400px;
            margin: auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        label {
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid gray;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            background-color: brown;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkred;
        }

        .contact-info {
            text-align: center;
            margin-top: 20px;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 12px;
            margin-top: 20px;
        }

    </style>
</head>

<body>

    <!-- Navigation -->
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Courses</a>
        <a href="shop.html">Shop</a>
        <a href="blog.html">Blog</a>
        <a href="contact.html">Contact</a>
    </nav>

    <!-- Heading -->
    <h1>Contact Programming Hub</h1>

    <p>Send us your message below.</p>

    <!-- Form -->
    <form>

        <label>Full Name</label>
        <input type="text" placeholder="Enter full name">

        <label>Email Address</label>
        <input type="email" placeholder="Enter email address">

        <label>Phone Number</label>
        <input type="tel" placeholder="Enter phone number">

        <label>Subject Line</label>
        <input type="text" placeholder="Enter subject">

        <label>Message</label>
        <textarea rows="5" placeholder="Write your message"></textarea>

        <button type="reset">Send Message</button>

    </form>

    <!-- Contact Info -->
    <div class="contact-info">

        <h2>Other Ways to Reach Us</h2>

        <p>Email: support@programminghub.com</p>

        <p>Phone: +254 700 123 456</p>

    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Programming Hub | Learn. Code. Create.</p>
    </footer>

</body>
</html>
